{# Barcode Generator Page Template #}
{% extends "frappe/www/page.html" %}

{% block title %}Barcode Generator{% endblock %}

{% block page_content %}
<div id="page-barcode-generator">
	<!-- Page content will be dynamically generated by barcode_generator.js -->
</div>
{% endblock %}

{% block script %}
<script>
	frappe.ready(function() {
		// Initialize the Barcode Generator page
		// The page content is created by barcode_generator.js which is loaded via page_js hook
		
		// Ensure the frappe desk object is available
		if (typeof frappe !== 'undefined' && typeof frappe.pages !== 'undefined') {
			// Page initialization is handled by the barcode_generator.js file
			// which creates the page UI using frappe.ui.make_app_page
			console.log('Barcode Generator page initialized');
		} else {
			console.warn('Frappe framework not fully loaded');
		}
	});
</script>
{% endblock %}
